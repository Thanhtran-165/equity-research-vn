# Classification: EXPECTED_TRANSFORMATION (insurance sector applicability)

ticker: BVH
sector: Insurance
total_mismatches: 5
all_classified: true
all_resolved: true

classification_summary:
  all_5_are: EXPECTED_TRANSFORMATION
  none_are: DEFECT

explanation: |
  BVH is an insurance company. Insurance-sector income statements do not have
  a single "Sales" / "Revenue" line item like industrial companies. Instead
  they have multiple specialized revenue concepts:
    - "Net sales from insurance business" (insurance premium revenue)
    - "Revenue from insurance premium"
    - "Net revenue of insurance premium"
    - "Income from financial activities"
    - "Revenue from real estate investment"

  The v1.0.1 builder's _CANONICAL_ALIASES["revenue"] uses exact-match aliases
  (set membership: {"net sales", "sales", "revenue", "total revenue",
                    "doanh thu", "total operating income", "net interest income"}).
  None of these EXACTLY matches BVH's insurance-specific column names
  ("Net sales from insurance business" ≠ "net sales").

  Therefore the builder correctly returns None for BVH revenue (fail-closed
  behavior preserved) and the contract stores revenue=0.0.

  Meanwhile, the period_key_resolver (a different module) uses substring
  matching ("net sales" is substring of "net sales from insurance business"),
  so it FOUND revenue values in the snapshot. This produces an apparent
  "mismatch": snapshot says revenue=40.95 trillion, contract says revenue=0.

  This is NOT a period-inversion defect. It is a SECTOR APPLICABILITY
  transformation: insurance companies' revenue is represented as 0 in the
  contract because the resolver correctly identifies that BVH doesn't have
  a generic "revenue" line, and the builder fail-closes rather than
  fabricating a value.

