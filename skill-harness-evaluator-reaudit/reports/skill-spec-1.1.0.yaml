requirements:
- id: REQ-001
  description: Sponsor package phải hoạt động (tier golden). KHÔNG fallback community
    tier.
  severity: critical
  how_to_check: 'command: python3 -c "from vnstock_data import Finance; print(''OK'')"
    2>/dev/null | grep -q OK'
  evidence_to_collect:
  - evidence/REQ-001.json
  - _summary.json
  applicable_condition: always
  pass_rule: exit_code == 0
  source_ref: REQ-001
  na_capable: false
- id: REQ-002
  description: Sponsor data phải trả ≥20 kỳ (không phải community 8 kỳ).
  severity: critical
