  pass_rule: All REQs mapped to phase7_deploy PASS, and task-state.json#phases.phase7_deploy.status
    == completed
  source_ref: phase7_deploy
conditional_steps: []
tools:
- python3
- node
- vnstock (golden tier)
- vercel (deploy)
- subagent per phase
prohibited_actions:
- Fallback community tier (8 periods) instead of golden (>=20)
- Deploy when any REQ FAIL
- Claim 'done' before verifier PASS
- 'Fabricate data: Oracle placeholder, wrong capex, invented multiples'
- Read entire pipeline into one context (must use subagent-per-phase isolation)
