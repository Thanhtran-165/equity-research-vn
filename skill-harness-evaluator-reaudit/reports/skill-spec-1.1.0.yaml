  - phases/phase0-sponsor.md
  - task-state.json#phases.phase0_sponsor
  applicable_condition: always
  pass_rule: All REQs mapped to phase0_sponsor PASS, and task-state.json#phases.phase0_sponsor.status
    == completed
  source_ref: phase0_sponsor
- &id002
