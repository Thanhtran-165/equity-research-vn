skill_id: equity-research-vn
skill_version: unknown
skill_path: /Users/bobo/.zcode/skills/equity-research-vn
triggers:
- user invokes /equity-research-vn [TICKER]
- request for full VN equity research (8-phase pipeline)
non_triggers:
- only a quick price lookup
- only news, no fundamental/valuation
- single-section edit of existing report
scope: 'Full equity research for a VN ticker: data, fundamental, valuation, technical
  (2 modes), news, dashboard, deploy — via subagent-per-phase with per-phase verification.'
out_of_scope:
- non-VN tickers
- real-time trading signals
- investment advice (NON-ADVICE in PROFILE)
inputs:
- name: ticker
  contract: '[TICKER] uppercase VN ticker (e.g. PNJ)'
  required: true
- name: work_dir
  contract: working directory for task-state + outputs
  required: true
required_steps:
