display_name: pdf-evidence
short_description: Evidence-first PDF QA with mandatory page citations.
icon_large: assets/pdf.png
default_prompt: |
  Read the provided PDF(s) and answer the question with verifiable citations
  in the form [file, page, section, quote]. If evidence is insufficient,
  abstain explicitly. Do not fabricate. Do not mix outside knowledge unless
  the user explicitly allows it (and then separate it into its own section).
