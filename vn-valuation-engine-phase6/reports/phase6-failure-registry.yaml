## Root cause analysis

The integration stack has a fundamental **architectural limitation**:

```yaml
current_architecture:
  SCHEMA_ADAPTER:
    role: "Lossless mapping layer — preserves child output structure"
    does_not: "Recompute, validate semantic correctness, or check registry"
  
  CHILD_VERIFIER (Phase 4 frozen):
    role: "Recompute checks for VALID methods (VVE-REQ-059)"
    does_not: "Validate bridge balance on preserved bridges, validate shares range, validate applicability consistency"
    limitation: "Originally designed for synthetic fixtures where values are known-good; doesn't have authority to recompute applicability decisions"
  
  INTEGRATION_VALIDATOR:
    role: "Verify adapter preserved method count/order/IDs"
    does_not: "Compare pre-mutation vs post-mutation (only sees post-mutation)"
```

The current adapter is **correct by design** — it's a lossless mapping, not a semantic validator. The semantic correctness responsibility belongs to:
1. **Child runner** (pre-adapter) — must produce correct values
2. **Child verifier** (post-child, pre-adapter) — must catch child-side semantic errors
3. **Parent verifier** (post-adapter, in production) — must catch residual issues

The Phase 6 integration test revealed that **child verifier has gaps** that were not visible in Phase 5R because Phase 5R used genuine outputs from a correct runner. Phase 6 mutations inject defects post-runner, which the existing verifier wasn't designed to catch.

