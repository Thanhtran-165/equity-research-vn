defaults:
  scoring:
    name_threshold_high: 90
    name_threshold_mid: 80
    avatar_distance_strong: 4
    avatar_distance_moderate: 8
    avatar_distance_weak: 12
    cover_distance_strong: 4
    cover_distance_moderate: 8
    cover_distance_weak: 12
    # recent_years auto-computed [now, now-1] — B.4 fix

brands:
  - id: chim_cut
    display_name: "Chim Cút"
    aliases:
      # Chỉ giữ các biến thể QUAN TRỌNG cho /public/ search
      # (mỗi alias = 1 request FB, giảm để tránh rate limit)
      - "Chim Cút"        # chính chủ
      - "Chim Cut"        # bỏ dấu — pattern kẻ gian phổ biến nhất
      - "ChimCut"         # viết liền bỏ dấu
      - "Chim Cụt"        # sai dấu
      - "Cut Chim"        # đảo ngược
    official_username: "chimcutvnindex"
    official_page_url: "https://www.facebook.com/chimcutvnindex"
    avatar_path: "./config/avatars/chim_cut_avatar.jpg"
    cover_path: "./config/avatars/chim_cut_cover.png"
    trademark:
      vn_number: ""
      vn_class: ""
      meta_ip_rights_id: ""
    scoring_overrides: {}
