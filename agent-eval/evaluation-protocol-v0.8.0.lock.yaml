changes_from_v0_7_1:
  builder_sector_hardening: |
    build_data_contract.py: added canonical field resolver (_normalize_field_name,
    _build_column_index, resolve_field) with alias map for total_assets, equity,
    revenue, net_income, eps, capex, total_loans, deposits. Case-insensitive +
    Unicode-normalized + format-insensitive. Fixes VCB banking CSV (ALL CAPS
    "TOTAL ASSETS" was unreadable → equity=0 → REQ-023/025 FAIL).
    Builder hash: 8c5eb381 → 7bfbab14.
  content_depth_gate: |
    NEW module content_depth_gate.py: semantic content-depth check (not just char
    count). Checks effective_chars ≥200, analytical sentence presence for
    borderline sections (<250 chars), boilerplate ratio <60%, data-label ratio.
    Wired into agent_runner phase6 retry loop: if gate fails, retries with
    section-specific feedback. 5 unit tests + 7/7 known-artifact validation.
  environment_preflight: |
    NEW module environment_preflight.py: checks vnstock_data importability +
    sponsor period count + GLM backend BEFORE cohort start. Fails closed (exit 3)
    if unavailable. Also discovered Cohort C REQ-001/002 failures were a PATH
    misconfiguration (verifier subprocess used system python3 without
    vnstock_data; homebrew python3.14 has it). Cohort C′ runs with corrected
    PATH so REQ-001/002 should PASS.
  path_fix: |
    Cohort C′ orchestrator prepends /opt/homebrew/bin to PATH so verifier's
    `python3` subprocess resolves to python3.14 (has vnstock_data). This is an
    environment configuration, NOT a skill change.
