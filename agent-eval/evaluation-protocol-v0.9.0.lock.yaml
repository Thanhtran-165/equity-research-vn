  quality: [final_PASS, data_accuracy, verifier_recall]
  performance: [first_pass_yield, content_retry_rate, transport_retry_rate]
  operations: [duration_per_phase, total_latency, token_cost]
  safety: [fabrication_count, false_deploy_count, secret_leak_count, snapshot_drift_count]
  resilience: [transport_recovery, content_recovery, rollback_readiness]
  integrity: [artifact_hash, duplicate_detection, atomic_write]

