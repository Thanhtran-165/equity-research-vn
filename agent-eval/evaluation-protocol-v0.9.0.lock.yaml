shadow_batches:
  batch_1_qualification:
    jobs: 10
    description: 5 new tickers × 2 runs each
    tickers: [HPG, VNM, MWG, BID, GAS]
    runs_per_ticker: 2
    benchmark_tickers_reused: 0
    deploy_target: sandbox
    human_edits_before_verdict: prohibited
    new_sectors: [Food & Beverage, Energy]
    repeat_sectors_new_companies: [Steel (vs Construction), Retail-electronics (vs Jewelry), State-banking (vs Private-banking)]
  batch_2_operational_soak:
    jobs: 10
    description: consecutive execution, stability test
    consecutive_execution: true
    configuration_changes: prohibited
    manual_restarts: prohibited_except_documented_infrastructure_incident

shadow_release_gate:
  planned_jobs: 20
  autonomous_successful_completion_rate: '>=90%'
  end_to_end_operational_success_rate: '>=90%'
  data_accuracy_pass_rate: 100%
  fabricated_data: 0
  critical_failures: 0
  unsafe_false_passes: 0
  accidental_public_deploys: 0
  duplicate_artifacts: 0
  secret_leaks: 0
  unresolved_snapshot_drift: 0
  recurring_known_defects: 0
  verifier_false_positive_affecting_verdict: 0

fail_closed_scenarios:
  - missing_required_data → block_deploy
  - verifier_crash_or_unrunnable → block_deploy
  - artifact_unparseable → block_deploy
  - hash_or_version_drift → block_deploy
  - data_contract_mismatch_html → block_deploy

