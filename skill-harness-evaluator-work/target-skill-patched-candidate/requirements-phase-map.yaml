# requirements-phase-map.yaml — Map REQ → Phase
# Verifier dùng file này để biết check REQ nào sau mỗi phase

phase_requirements:
  phase0_sponsor:
    reqs: [REQ-001, REQ-002]
    description: "Sponsor package detection"
  
  phase1_data:
    reqs: [REQ-003, REQ-004]
    description: "Data collection + split audit"
  
  phase2_fundamental:
    reqs: []  # fundamental có REQ-013 content depth nhưng check ở Phase 6
    description: "Fundamental analysis (DuPont, ROE, CAGR)"
  
  phase3_valuation:
    reqs: [REQ-016]
    description: "Valuation (PE/PB/DCF sanity)"
  
  phase4a_tech_active:
    reqs: [REQ-005]
    description: "Technical mode ACTIVE (Tech Score, Verdict)"
  
  phase4b_tech_profile:
    reqs: [REQ-006, REQ-007]
    description: "Technical mode PROFILE (non-advice)"
  
  phase5_news:
    reqs: [REQ-008]
    description: "News digest + sentiment"
  
  phase6_dashboard:
    reqs: [REQ-009, REQ-010, REQ-011, REQ-012, REQ-013, REQ-014, REQ-015, REQ-017, REQ-018, REQ-019, REQ-020, REQ-028]
    description: "Dashboard build (structure + content depth + chart render-readiness)"
  
  phase7_deploy:
    reqs: [REQ-021]
    description: "Final verify + deploy"
